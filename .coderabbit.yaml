# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# https://docs.coderabbit.ai/getting-started/configure-coderabbit

# CodeRabbit Configuration
# Optimized for Rust 2024 Edition / Rocket 0.5 RESTful API project

language: en-US
early_access: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: false
  poem: false
  abort_on_close: true

  path_instructions:
    - path: "src/**/*.rs"
      instructions: |
        - Follow Rust naming conventions (snake_case for functions/variables/files, PascalCase for types/structs/enums)
        - Minimize `.clone()` calls; prefer references and borrowing
        - Use `&[T]` instead of `&Vec<T>` when Vec-specific methods are not needed
        - Never use `unwrap()` or `expect()` in production paths; propagate errors with `?`
        - No blocking operations inside async handlers
        - Ensure `Result<T, E>` with domain-specific error types for fallible operations

    - path: "src/routes/**/*.rs"
      instructions: |
        - Route handlers are HTTP-only: delegate all business logic to services
        - Verify HTTP status codes: 200 OK, 201 Created, 204 No Content,
          404 Not Found, 409 Conflict, 422 Unprocessable Entity
        - Only #[get], #[post], #[put], #[delete] attributes are valid.
          This API does NOT implement PATCH — flag any #[patch] handler.
        - State is an r2d2 connection pool injected as
          &State<Pool<ConnectionManager<SqliteConnection>>>; no manual Mutex locking
        - Surrogate key (UUID) is used only for GET /players/{id};
          all mutation routes use squad_number as the natural key

    - path: "src/services/**/*.rs"
      instructions: |
        - Pure business logic only: no HTTP knowledge, no Diesel or SQL imports
        - All fallible functions return Result<T, CustomError>
        - squad_number uniqueness is enforced on create
        - On update, UUID and squad_number are always preserved from the stored
          record — request body values for these fields are ignored

    - path: "src/repositories/**/*.rs"
      instructions: |
        - All Diesel DSL queries live here; services must not import Diesel directly
        - Functions return Result<T, CustomError> and propagate errors with ?
        - Minimize .clone(); prefer references where lifetimes allow

    - path: "src/models/**/*.rs"
      instructions: |
        - Maintain three distinct types: `Player` (storage), `PlayerRequest` (input), `PlayerResponse` (output)
        - Verify `serde` derive macros and camelCase JSON field naming (`#[serde(rename_all = "camelCase")]`)
        - `id` (UUID) and `squad_number` are immutable once set — validate that no model allows changing them after creation
        - All `PlayerRequest` fields are required; this API has no partial-update endpoint

    - path: "src/state/**/*.rs"
      instructions: |
        - This module initializes the r2d2 connection pool
          (Pool<ConnectionManager<SqliteConnection>>)
        - embed_migrations!() must be called on startup to run all pending Diesel
          migrations before any route is served
        - No business logic or HTTP knowledge belongs here

    - path: "src/main.rs"
      instructions: |
        - #[launch] macro generates main()
        - All route modules are mounted at "/"
        - State must be the r2d2 pool returned by the state initializer
        - Port must remain 9000 (configured in Rocket.toml)

    - path: "src/lib.rs"
      instructions: |
        - Re-exports all modules as pub mod: models, repositories, routes,
          schema, services, state
        - Keep minimal — this file exists only to expose modules to integration tests

    - path: "tests/**/*.rs"
      instructions: |
        - Integration tests only; import from the library crate (`rust_samples_rocket_restful::`)
        - Follow AAA pattern with // Arrange, // Act, // Assert section comments
        - Naming: test_request_{method}_{endpoint}_{condition}_response_{verification}
        - Use initialize_test_database() (full seeded pool) for most tests;
          imported from the library crate (state::player_collection), NOT from tests/common
        - Use initialize_empty_test_database() (schema only, no seed rows) where needed;
          also imported from the library crate
        - Use player_request_for_creation() and player_request_for_update() from
          tests/common for request bodies
        - Use EXISTING_PLAYER_ID from tests/common for UUID-based GET tests —
          never hardcode UUID strings inline
        - Verify complete response objects (all fields), not just status codes

  path_filters:
    - "!**/target/**"
    - "!**/*.db"
    - "!**/*.db-shm"
    - "!**/*.db-wal"

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
    drafts: false
    base_branches:
      - master
      - main

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    custom:
      - name: "sync documentation"
        instructions: |
          This is a PoC/learning project targeting developers unfamiliar with the stack.
          Documentation is a first-class concern. Review the PR changes and perform the
          following three checks:

          ## 1. Doc comments
          For every public function, method, or handler touched in the PR:
          - If it lacks a doc comment (`///`), add one using Rust's idiomatic format.
          - If it has one but no longer matches the current signature, parameters,
            or behavior, update it.
          - Doc comments should explain *why* and *what*, not just restate the signature.
            Assume the reader is learning Rust and Rocket.

          ## 2. README.md
          Check whether the PR introduces or removes endpoints, changes behavior,
          adds dependencies, or modifies how to run the project.
          If so, update the relevant sections of README.md to reflect the current state.
          Do not rewrite sections unrelated to the changes.

          ## 3. CLAUDE.md
          If the PR introduces patterns, conventions, or architectural decisions that
          should guide future AI-assisted contributions, add or update the relevant
          instructions in CLAUDE.md.
          Focus on things a developer (or AI assistant) unfamiliar with this specific
          Rust/Rocket implementation should know before writing code here.

      - name: "enforce http error handling"
        instructions: |
          Audit all HTTP handler functions in the changed files.
          Verify that errors return appropriate HTTP status codes (404 for not found,
          409 for conflict, 422 for malformed payloads, 500 for unexpected errors).
          Flag handlers that return 200 on error, swallow errors silently, or use
          bare status-only responses where a body would be appropriate.
          Do not make changes; only report findings as a comment so fixes can be
          applied consistently across the entire codebase.

      - name: "idiomatic review"
        instructions: |
          Review the changed files for non-idiomatic Rust patterns. Flag code that
          looks like it was translated from another language rather than written
          naturally for Rust. Pay particular attention to:
          - Unnecessary `.clone()` calls that could be replaced with references
          - `unwrap()`/`expect()` in production paths
          - `&Vec<T>` parameters where `&[T]` suffices
          - Missing `?` propagation
          - Blocking operations in async contexts
          Suggest idiomatic alternatives with brief explanations. This is a PoC
          comparison project, so idiomatic usage is a first-class concern.

      - name: "verify api contract"
        instructions: |
          Review the changed files and verify that all HTTP endpoints (method, path,
          request body shape, and response shape) match the project's intended REST API
          contract. Check the README or any spec/contract file in the repo for reference.
          Pay special attention to the surrogate vs. natural key design:
          - UUID (`id`) is used only for `GET /players/{uuid}`
          - `squad_number` is used for all mutation routes (PUT, DELETE)
          Flag any deviations — missing fields, wrong status codes, inconsistent naming.
          Do not make changes; only report findings as a comment.

  pre_merge_checks:
    docstrings:
      mode: warning
      threshold: 80
    title:
      mode: warning
      requirements: |
        - Use Conventional Commits format (feat:, fix:, chore:, docs:, test:, refactor:, ci:, perf:)
        - Keep under 80 characters
        - Be descriptive and specific
    description:
      mode: off
    issue_assessment:
      mode: off

  tools:
    # Secret scanners
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true

    # IaC / infrastructure
    checkov:
      enabled: true
    trivy:
      enabled: true
    hadolint:
      enabled: true

    # General static analysis
    semgrep:
      enabled: true
    opengrep:
      enabled: true
    clippy:
      enabled: true
    shellcheck:
      enabled: true

    # File-type linters
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    markdownlint:
      enabled: true
    dotenvLint:
      enabled: true
    osvScanner:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 120000

    # Disable irrelevant tools for this Rust project
    ruff:
      enabled: false
    biome:
      enabled: false
    swiftlint:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    golangci-lint:
      enabled: false
    detekt:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    pmd:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    sqlfluff:
      enabled: false
    prismaLint:
      enabled: false
    pylint:
      enabled: false
    oxc:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    htmlhint:
      enabled: false
    languagetool:
      enabled: false
    circleci:
      enabled: false
    fortitudeLint:
      enabled: false
    stylelint:
      enabled: false
    checkmake:
      enabled: false
    blinter:
      enabled: false
    psscriptanalyzer:
      enabled: false

chat:
  art: true
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  mcp:
    usage: auto

code_generation:
  docstrings:
    language: en-US
    path_instructions:
      - path: "src/**/*.rs"
        instructions: |
          - Use Rust doc comments (`///`) for all public items
          - Place module-level documentation in `//!` comments at the top of the file
          - Document public functions, types, and trait implementations
          - Include `# Returns`, `# Arguments`, and `# Example` sections where helpful
          - Assume the reader is learning Rust — explain the *why*, not just the *what*
          - Reference Rust-specific concepts (ownership, borrowing, RAII) when relevant
  unit_tests:
    path_instructions:
      - path: "tests/**/*.rs"
        instructions: |
          - Integration tests only — import from the library crate (`rust_samples_rocket_restful::`)
          - Follow AAA pattern with `// Arrange`, `// Act`, `// Assert` comments
          - Naming: `test_request_{method}_{endpoint}_{condition}_response_{verification}`
          - Use fixture functions for test data — no inline magic values
          - Use initialize_test_database() from the library crate (state::player_collection)
            for the full seeded pool; use initialize_empty_test_database() for schema-only
          - Use EXISTING_PLAYER_ID from tests/common for UUID-based GET tests —
            never hardcode UUID strings inline
          - Concurrency tests clone the r2d2 pool across threads via Pool::clone()

issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - planning
  labeling:
    labeling_instructions: []
    auto_apply_labels: false
