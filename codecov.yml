# Codecov Configuration
# Goal: 80% minimum coverage on services/, routes/, repositories/ only

coverage:
  status:
    project:
      default:
        target: 80%
        paths:
          - "src/services/"
          - "src/routes/"
          - "src/repositories/"

    patch:
      default:
        target: 80%

ignore:
  - ".github/**/*"
  - ".vscode/**/*"
  - "migrations/**/*"
  - "tests/**/*"
  - "src/models/**/*"
  - "src/schema.rs"
  - "src/state/**/*"
  - "src/main.rs"
  - "**/*.toml"
  - "**/*.yml"
  - "**/*.yaml"
  - "**/*.md"
