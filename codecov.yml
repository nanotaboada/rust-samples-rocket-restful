# Codecov Configuration
# Goal: maximum coverage on business logic layers (services/, routes/, repositories/)
# Excludes generated code, entry points, infrastructure wiring, and module re-exports

coverage:
  status:
    project:
      default:
        target: 80%
        paths:
          - "src/services/"
          - "src/routes/"
          - "src/repositories/"

    patch:
      default:
        target: 80%

ignore:
  - ".github/**/*"
  - ".vscode/**/*"
  - "migrations/**/*"
  - "tests/**/*"
  - "src/models/**/*"
  - "src/schema.rs"
  - "src/state/**/*"
  - "src/main.rs"
  - "src/**/mod.rs"
  - "**/*.toml"
  - "**/*.yml"
  - "**/*.yaml"
  - "**/*.md"
